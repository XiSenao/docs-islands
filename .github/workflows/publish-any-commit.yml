name: Publish Any Commit

env:
  NODE_OPTIONS: --max-old-space-size=4096
  NODE_VERSION: "20.19.0"
  SITE_DEBUG_AI_CACHE_KEY_PREFIX: site-debug-ai-build-reports-v1
  SITE_DEBUG_AI_CACHE_PATH: packages/vitepress/docs/.vitepress/cache/site-debug-ai/build-reports

on: [push, pull_request]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Site Debug AI Cache
        # actions/cache@v5.0.0
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0
        with:
          enableCrossOsArchive: true
          key: ${{ env.SITE_DEBUG_AI_CACHE_KEY_PREFIX }}-${{ hashFiles('pnpm-lock.yaml', 'packages/vitepress/docs/**/*', 'packages/vitepress/src/**/*', 'packages/vitepress/theme/**/*', 'packages/vitepress/types/**/*', 'packages/vitepress/package.json', 'utils/env.ts') }}
          path: ${{ env.SITE_DEBUG_AI_CACHE_PATH }}
          restore-keys: |
            ${{ env.SITE_DEBUG_AI_CACHE_KEY_PREFIX }}-

      - name: Build
        run: DOCS_ISLANDS_MODE="production" DOCS_ISLANDS_RELEASE="1" pnpm build

      - name: Publish @docs-islands/vitepress preview package
        run: pnpm dlx pkg-pr-new@0.0 publish --compact --pnpm ./packages/vitepress/dist
