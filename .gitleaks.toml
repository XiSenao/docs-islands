title = "docs-islands gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Ignore non-secret cacheKey fields in generated debug reports"
regexes = [
  '''"cacheKey"\s*:\s*"[\w.=-]{10,150}"'''
]
paths = [
  '''(?:^|/)packages/vitepress/docs/\.vitepress/site-debug-reports(?:/.*)?$''',
]


